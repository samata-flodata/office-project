function makeCircleIcon(text, bg = "#0B57D0", fg = "#ffffff") {
  const size = 128;
  const c = document.createElement("canvas");
  c.width = c.height = size;
  const ctx = c.getContext("2d");

  // circle
  ctx.beginPath();
  ctx.arc(size / 2, size / 2, size / 2 - 6, 0, Math.PI * 2);
  ctx.fillStyle = bg;
  ctx.fill();

  // subtle border
  ctx.lineWidth = 6;
  ctx.strokeStyle = "rgba(255,255,255,0.9)";
  ctx.stroke();

  // text (1–2 letters)
  const t = (text || "?").trim().toUpperCase().slice(0, 2);
  ctx.fillStyle = fg;
  ctx.font = "bold 56px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(t, size / 2, size / 2 + 2);

  return c.toDataURL("image/png");
}

    // Display all events from calendar in the card
    function displayAllEventsInCard(events) {
      const card = document.getElementById("roomDetailsCard");

      const now = new Date();

      const filteredEvents = events

          const end = new Date(event.end.dateTime || event.end.date);

        .sort((a, b) => {
          const aStart = new Date(a.start.dateTime || a.start.date);
          const bStart = new Date(b.start.dateTime || b.start.date);

    let yaw = 50, pitch = -139, roll = -90;
    const BASE_ALT = 0.01;
    const FLOOR_H = 3.6;
    const STACK_COMPRESS = -0.6;
    const ALT_GROUND = BASE_ALT + 0 * FLOOR_H + 0 * STACK_COMPRESS;
    const ALT_1ST = BASE_ALT + 1 * FLOOR_H + 1 * STACK_COMPRESS;
    const ALT_2ND = BASE_ALT + 2 * FLOOR_H + 2 * STACK_COMPRESS;
    const ALT_3RD = BASE_ALT + 3 * FLOOR_H + 3 * STACK_COMPRESS;



    /* MATRIX & MODEL LOADING (omitted for brevity, assume working) */
    function computeMatrix(alt, zOffset = 0) {
      const pos = Cesium.Cartesian3.fromDegrees(LONG, LAT, alt);
      const enu = Cesium.Transforms.eastNorthUpToFixedFrame(pos);

      const Rz = Cesium.Matrix3.fromRotationZ(Cesium.Math.toRadians(yaw));
      const Rx = Cesium.Matrix3.fromRotationX(Cesium.Math.toRadians(pitch));
      const Ry = Cesium.Matrix3.fromRotationY(Cesium.Math.toRadians(roll));

      const rot = Cesium.Matrix3.multiply(
        Rz, Cesium.Matrix3.multiply(Ry, Rx, new Cesium.Matrix3()), new Cesium.Matrix3()
      );

      // rotation matrix
      const rot4 = Cesium.Matrix4.fromRotationTranslation(rot);

      // ✅ apply vertical shift in the model's local UP (meters)
      const shifted = Cesium.Matrix4.clone(rot4, new Cesium.Matrix4());
      Cesium.Matrix4.multiplyByTranslation(
        shifted,
        new Cesium.Cartesian3(0, 0, zOffset),
        shifted
      );

      const result = new Cesium.Matrix4();
      Cesium.Matrix4.multiply(enu, shifted, result);
      return result;
    }

    function isPresentOrFutureEvent(event) {
  // Cesium "now" in UTC
  const nowJulian = viewer.clock.currentTime;

  // Convert Google Calendar times → JulianDate (UTC-safe)
  const startJulian = Cesium.JulianDate.fromDate(
    new Date(event.start.dateTime || event.start.date)
  );

  const endJulian = Cesium.JulianDate.fromDate(
    new Date(event.end.dateTime || event.end.date)
  );

  // ongoing OR future
  return (
    Cesium.JulianDate.greaterThanOrEquals(startJulian, nowJulian) ||
    (
      Cesium.JulianDate.lessThanOrEquals(startJulian, nowJulian) &&
      Cesium.JulianDate.greaterThanOrEquals(endJulian, nowJulian)
    )
  );
}

function makeRoundIcon(pngPath, bgColor = "#1E3A8A") {
  const size = 128;
  const iconSize = 64;

  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");

  // background circle
  ctx.beginPath();
  ctx.arc(size / 2, size / 2, size / 2 - 4, 0, Math.PI * 2);
  ctx.fillStyle = bgColor;
  ctx.fill();

  // white border
  ctx.lineWidth = 6;
  ctx.strokeStyle = "#ffffff";
  ctx.stroke();

  // draw icon
  const img = new Image();
  img.src = pngPath;

  return new Promise((resolve) => {
    img.onload = () => {
      ctx.drawImage(
        img,
        (size - iconSize) / 2,
        (size - iconSize) / 2,
        iconSize,
        iconSize
      );
      resolve(canvas.toDataURL("image/png"));
    };
  });
}

async function openFloorProfessional(floorNumber) {
  if (isFloorTransitionRunning) return;
  isFloorTransitionRunning = true;

  try {
    // Disable auto indoor/outdoor while transition
    autoIndoorEnabled = false;

    // STEP 1: Always show full building first
    showFloor(0);

    // Wait small time so model visibility updates
    await new Promise(r => setTimeout(r, 200));

    // Center of building (use full building bounding sphere)
    const buildingCenter =
      (modelFullBuilding && modelFullBuilding.boundingSphere)
        ? modelFullBuilding.boundingSphere.center
        : Cesium.Cartesian3.fromDegrees(LONG, LAT, BASE_ALT);

    // STEP 2: Smooth zoom to desired floor window (outside view)
    const camCfg = FLOOR_CAMERA_TARGETS[floorNumber] || FLOOR_CAMERA_TARGETS[1];

    await flyToAsync({
      destination: buildingCenter,
      orientation: {
        heading: camCfg.heading,
        pitch: camCfg.pitch,
        roll: 0
      },
      duration: 2.8
    });

    // STEP 3: Switch to indoor model ONLY AFTER camera is stable
    showFloor(floorNumber);

    await new Promise(r => setTimeout(r, 250));

    // STEP 4: Move to top-down view (indoor)
    const floorModel =
      floorNumber === 1 ? modelGround :
      floorNumber === 2 ? model1 :
      floorNumber === 3 ? model2 :
      floorNumber === 4 ? model3 :
      null;

    const floorCenter =
      (floorModel && floorModel.boundingSphere)
        ? floorModel.boundingSphere.center
        : buildingCenter;

    // Use viewBoundingSphere for perfect top view
    viewer.camera.viewBoundingSphere(
      new Cesium.BoundingSphere(floorCenter, 12),
      new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(0),
        Cesium.Math.toRadians(-90),
        25
      )
    );

    // Lock indoor mode
    mode = "INDOOR";
    indoorFloor = floorNumber;

  } catch (err) {
    console.error("Floor transition error:", err);
  } finally {
    isFloorTransitionRunning = false;
  }
}

// Detect floor only once when entering indoor
function detectFloorFromScreenCenter() {
  const canvas = viewer.scene.canvas;
  const center = new Cesium.Cartesian2(
    canvas.clientWidth / 2,
    canvas.clientHeight / 2
  );

  const picked = viewer.scene.pick(center);

  if (!picked || !picked.primitive) return null;

  const prim = picked.primitive;

  if (prim === modelGround) return 1; // ground
  if (prim === model1) return 2;      // 1st
  if (prim === model2) return 3;      // 2nd
  if (prim === model3) return 4;      // 3rd

  return null;
}

          else if (geometry.type === "Polygon" || geometry.type === "MultiPolygon") {
            // FIX: Calculates Centroid for Polygon door geometries

              ? geometry.coordinates[0][0]

              sumLon += lon;

            lonDeg = sumLon / coordinates.length;
            latDeg = sumLat / coordinates.length;

    // Build graph connecting centerline points sequentially
    function buildCenterlineGraph(centerlinePoints, altitude) {
      if (centerlinePoints.length === 0) return [];

      const graph = centerlinePoints.map((cp, idx) => ({
        pos: Cesium.Cartesian3.fromDegrees(cp.lon, cp.lat, altitude + 0.1),
        lon: cp.lon, lat: cp.lat,
        id: cp.id || `node-${idx}`,
        edges: []
      }));

      // CONNECTION 1: Sequential (Follows your hallway drawing)
      for (let i = 0; i < graph.length - 1; i++) {
        const dist = Cesium.Cartesian3.distance(graph[i].pos, graph[i + 1].pos);
        // Only connect if points are close (prevents jumping between unrelated segments)
        if (dist < 10.0) {
          graph[i].edges.push({ node: graph[i + 1], w: dist });
          graph[i + 1].edges.push({ node: graph[i], w: dist });
        }
      }


      
      // CONNECTION 2: Junctions (This creates the "shortcuts" for the purple line)
      // If two hallways meet, this "welds" them together
      for (let i = 0; i < graph.length; i++) {
        for (let j = i + 1; j < graph.length; j++) {
          const d = Cesium.Cartesian3.distance(graph[i].pos, graph[j].pos);
          // If points are nearly identical (under 0.5 meters), they are an intersection
          if (d < 0.5) {
            graph[i].edges.push({ node: graph[j], w: d });
            graph[j].edges.push({ node: graph[i], w: d });
          }
        }
      }
      return graph;
    }

                doorNode.edges.push({ node, w: d });

            }
        });

        graph.push(doorNode);

    function nearest(graph, pos) {
      let best = graph[0], dmin = Infinity;
      graph.forEach(n => {

    function findPath(graph, start, goal) {
      const open = new Set([start]);
      const came = new Map();
      const g = new Map([[start, 0]]);
      const f = new Map([[start, Cesium.Cartesian3.distance(start.pos, goal.pos)]]);

      function lowest() {
        let best = null, bestVal = Infinity;
        for (let n of open) {
          const v = f.get(n) ?? Infinity;
          if (v < bestVal) { bestVal = v; best = n; }
        }
        return best;
      }

      while (open.size) {
        const cur = lowest();
        if (cur === goal) {
          const path = [];
          let n = cur;
          while (n) { path.unshift(n.pos); n = came.get(n); }
          return path;
        }

        open.delete(cur);

        cur.edges.forEach(e => {
          const n = e.node;
          const gNew = g.get(cur) + e.w;
          if (gNew < (g.get(n) ?? Infinity)) {
            came.set(n, cur);
            g.set(n, gNew);
            f.set(n, gNew + Cesium.Cartesian3.distance(n.pos, goal.pos));
            open.add(n);
          }
        });
      }
      return null;
    }

    // Compute heading in ENU (radians) from p -> q
    function headingENU(p, q) {
      const enu = Cesium.Transforms.eastNorthUpToFixedFrame(p);
      const inv = Cesium.Matrix4.inverse(enu, new Cesium.Matrix4());
      const lp = Cesium.Matrix4.multiplyByPoint(inv, p, new Cesium.Cartesian3());
      const lq = Cesium.Matrix4.multiplyByPoint(inv, q, new Cesium.Cartesian3());

      const dx = lq.x - lp.x; // East
      const dy = lq.y - lp.y; // North
      return Math.atan2(dy, dx);
    }

    // Place arrow billboards along a path every `stepMeters`
    function addRouteArrows(pathPositions, idPrefix, stepMeters = 6) {
      if (!pathPositions || pathPositions.length < 2) return;

      for (let i = 1; i < pathPositions.length; i++) {
        const a = pathPositions[i - 1];
        const b = pathPositions[i];
        const segLen = Cesium.Cartesian3.distance(a, b);
        if (segLen < 0.001) continue;

        const head = headingENU(a, b);
        const rot = head - Cesium.Math.PI_OVER_TWO; // SVG points up

        const count = Math.max(1, Math.floor(segLen / stepMeters));
        for (let k = 1; k <= count; k++) {
          const t = k / (count + 1);
          const pos = Cesium.Cartesian3.lerp(a, b, t, new Cesium.Cartesian3());

          viewer.entities.add({
            id: `${idPrefix}${i}_${k}`,
            position: pos,
            billboard: {
              image: ROUTE_ARROW_SVG,
              scale: 0.13, // arrow size
              rotation: rot,
              alignedAxis: Cesium.Cartesian3.UNIT_Z,
              disableDepthTestDistance: Number.POSITIVE_INFINITY
            }
          });
        }
      }
    }

    function createSampledPositionProperty(pathPositions, durationSeconds) {
      const positionProperty = new Cesium.SampledPositionProperty();
      positionProperty.setInterpolationOptions({
        interpolationDegree: 3,
        interpolationAlgorithm: Cesium.LagrangePolynomialApproximation
      });

      if (!pathPositions || pathPositions.length === 0) {
        console.error("Path positions is empty!");
        return positionProperty;

      // Calculate time step for each segment
      const timeStep = durationSeconds / (pathPositions.length - 1);

      pathPositions.forEach((position, index) => {
        const time = Cesium.JulianDate.addSeconds(
          animationState.startTime,
          index * timeStep,
          new Cesium.JulianDate()
        );
        positionProperty.addSample(time, position);
      });

      return positionProperty;
    }

            scale: 0.15,
            disableDepthTestDistance: Number.POSITIVE_INFINITY
        },
        label: {
            text: "END",
            font: "14px bold sans-serif",
            fillColor: Cesium.Color.WHITE,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 3,
            pixelOffset: new Cesium.Cartesian2(0, -30),
            disableDepthTestDistance: Number.POSITIVE_INFINITY
        }
    });
}


    /**
     * Combine two paths (two floors) with altitude transitions
     * @param {Array<Cesium.Cartesian3>} pathFloorA - Path on starting floor
     * @param {Array<Cesium.Cartesian3>} pathFloorB - Path on destination floor
     * @returns {Array<Cesium.Cartesian3>} Combined path
     */
    function combinePaths(pathFloorA, pathFloorB) {
      if (!pathFloorB || pathFloorB.length === 0) {
        return pathFloorA;
      }

      // Remove the last point of pathA (stairs entry) and combine with pathB
      const combinedPath = [];

      if (pathFloorA && pathFloorA.length > 0) {
        combinedPath.push(...pathFloorA.slice(0, -1)); // Exclude last point
      }

      if (pathFloorB && pathFloorB.length > 0) {
        combinedPath.push(...pathFloorB); // Include all of pathB
      }

      return combinedPath;
    }

    /**
     * Initialize animation with combined path
     */
    function initializeAnimation() {
      const combinedPath = combinePaths(animationState.pathA, animationState.pathB);

      if (!combinedPath || combinedPath.length < 2) {
        alert("Path is empty! Please generate a navigation route first.");
        return;
      }

      // Calculate duration based on path length (adjust SPEED_FACTOR as needed)
      const SPEED_FACTOR = 50; // Meters per second
      let totalDistance = 0;

      for (let i = 1; i < combinedPath.length; i++) {
        totalDistance += Cesium.Cartesian3.distance(combinedPath[i - 1], combinedPath[i]);
      }

      // Duration in seconds
      animationState.totalDuration = Math.max(totalDistance / SPEED_FACTOR, 1);

      // Set start time to current simulation time
      animationState.startTime = viewer.clock.currentTime.clone();

      // Create sampled position property
      animationState.positionProperty = createSampledPositionProperty(
        combinedPath,
        animationState.totalDuration
      );

      // Create marker
      createMarkerEntity(animationState.positionProperty);

      // Show animation panel
      // animation panel disabled


      // Reset button states
      animationState.isRunning = true;
      animationState.isPaused = false;
      updateButtonStates();
      // Ensure clock multiplier matches current speed setting
      updateAnimationSpeed();
    }

    /**
     * Start or resume animation
     */
    function toggleAnimation() {
      if (animationState.isPaused) {
        // Resume from pause
        const pausedDelta = Cesium.JulianDate.secondsDifference(
          Cesium.JulianDate.now(),
          animationState.pauseTime
        );

        animationState.startTime = Cesium.JulianDate.addSeconds(
          animationState.startTime,
          pausedDelta,
          new Cesium.JulianDate()
        );

        animationState.isPaused = false;
      }

      viewer.clock.shouldAnimate = true;
      animationState.isRunning = true;
      updateButtonStates();
    }

    /**
     * Pause animation
     */
    function pauseAnimation() {
      viewer.clock.shouldAnimate = false;
      animationState.isPaused = true;
      animationState.pauseTime = Cesium.JulianDate.now();
      updateButtonStates();
    }

    /**
     * Reset animation to start
     */
    function resetAnimation() {
      // Pause first
      pauseAnimation();

      // Reset start time to now
      animationState.startTime = viewer.clock.currentTime.clone();

      // Rebuild the sampled position property so sample times align with the new start time
      const combinedPath = combinePaths(animationState.pathA, animationState.pathB);
      if (combinedPath && combinedPath.length >= 2) {
        animationState.positionProperty = createSampledPositionProperty(
          combinedPath,
          animationState.totalDuration
        );
        createMarkerEntity(animationState.positionProperty);
      }

      // Keep animation paused until user presses Play
      animationState.isPaused = true;
      animationState.isRunning = false;
      updateButtonStates();
    }

    /**
     * Update animation speed
     */
    function updateAnimationSpeed() {
      const speedValue = parseFloat(document.getElementById("speedSlider").value);
      animationState.animationSpeed = speedValue;
      document.getElementById("speedLabel").textContent = speedValue.toFixed(1) + "x";

      // Adjust clock multiplier for speed control
      viewer.clock.multiplier = speedValue;
    }

    /**
     * Update button states based on animation state
     */
    function updateButtonStates() {
      const playBtn = document.getElementById("playBtn");
      const pauseBtn = document.getElementById("pauseBtn");

      if (animationState.isRunning && !animationState.isPaused) {
        playBtn.style.display = "none";
        pauseBtn.style.display = "block";
      } else {
        playBtn.style.display = "block";
        pauseBtn.style.display = "none";
      }
    }

    /**
     * Update camera to follow marker
     */
    function updateCameraFollow() {
      if (!animationState.markerEntity) return;
      const pos = animationState.markerEntity.position.getValue(viewer.clock.currentTime);
      if (!pos) return;

      viewer.camera.viewBoundingSphere(
        new Cesium.BoundingSphere(pos, 2),
        new Cesium.HeadingPitchRange(
          viewer.camera.heading,           // Allows you to rotate the view manually
          Cesium.Math.toRadians(-90),      // Straight down
          25.0                             // High enough to see the floor plan
        )
      );
    }

    // Listen to checkbox changes
    document.getElementById("cameraFollow").addEventListener("change", (e) => {
      animationState.cameraFollowMode = e.target.checked;
    });

    document.getElementById("showPath").addEventListener("change", (e) => {
      const showPath = e.target.checked;

      const lineA = viewer.entities.getById("navigationLineA");
      const lineB = viewer.entities.getById("navigationLineB");
      const stairsLine = viewer.entities.getById("stairsLine");

      if (lineA) lineA.show = showPath;
      if (lineB) lineB.show = showPath;
      if (stairsLine) stairsLine.show = showPath;

      // ✅ also hide/show arrows
      viewer.entities.values.forEach(ent => {
        if (!ent.id) return;
        if (ent.id.startsWith("routeArrowA_") || ent.id.startsWith("routeArrowB_") || ent.id.startsWith("routeArrowS_")) {
          ent.show = showPath;
        }
      });
    });


    // Update camera follow in render loop
    // Real-time speed slider update
    const speedSlider = document.getElementById("speedSlider");
    if (speedSlider) {
      speedSlider.addEventListener("input", updateAnimationSpeed);
    }
    viewer.scene.preRender.addEventListener(() => {
      if (animationState.isRunning && !animationState.isPaused) {
        // Update camera follow
        if (animationState.cameraFollowMode) {
          updateCameraFollow();
        }

        // Check if animation has completed
        const currentTime = viewer.clock.currentTime;
        const animationEndTime = Cesium.JulianDate.addSeconds(
          animationState.startTime,
          animationState.totalDuration,
          new Cesium.JulianDate()
        );

        if (Cesium.JulianDate.compare(currentTime, animationEndTime) > 0) {
          // Animation completed - loop it
          animationState.startTime = viewer.clock.currentTime.clone();
          if (animationState.positionProperty) {
            const combinedPath = combinePaths(animationState.pathA, animationState.pathB);
            animationState.positionProperty = createSampledPositionProperty(
              combinedPath,
              animationState.totalDuration
            );
            createMarkerEntity(animationState.positionProperty);
          }
        }
      }
    });

    function updateRoomAvailability(events) {
  const bookingMap = buildRoomBookingMap(events);

  viewer.dataSources._dataSources.forEach(ds => {
    ds.entities.values.forEach(entity => {
      if (!entity.polygon) return;

      const geoRoomName = entity.properties?.room_name?.getValue();
      if (!geoRoomName) return;

      const normalizedGeoName = normalizeRoomName(geoRoomName);
      if (!BOOKABLE_ROOMS.has(normalizedGeoName)) return;

      const roomEvents = bookingMap[normalizedGeoName] || [];

      // ✅ ONLY keep ongoing or future bookings
      const now = new Date();

const activeBookings = roomEvents.filter(b =>
  b.end >= now
);


      if (activeBookings.length > 0) {
        // 🔴 BOOKED
        entity.polygon.material = Cesium.Color.RED.withAlpha(0.6);
        entity.description = createTooltipHTML(geoRoomName, activeBookings);
      } else {
        // 🟢 AVAILABLE
        entity.polygon.material = Cesium.Color.GREEN.withAlpha(0.4);
        entity.description = createTooltipHTML(geoRoomName, []);
      }
    });
  });
}


function updateNavigationUI(steps) {
    document.getElementById("fromNameDisplay").innerText = steps.fromName;
    document.getElementById("toNameDisplay").innerText = steps.toName;

    const navSummary = document.getElementById("navSummary");
    const navSteps = document.getElementById("navSteps");

    navSummary.innerHTML = `🚶 ${steps.totalDistance} m &nbsp; ⏱ ${steps.totalTime} min`;

    navSteps.innerHTML = steps.list.map(step => `
        <div class="nav-step">
            <div class="step-icon">${step.icon}</div>
            <div class="step-details">
                <div class="step-title">${step.title}</div>
                ${
                    step.primary
                    ? `<div class="step-box">${step.primary}</div>`
                    : `<div class="step-text">${step.text}</div>`
                }
            </div>
        </div>
    `).join("");
}



    viewer.screenSpaceEventHandler.setInputAction(movement => {
      const picked = viewer.scene.pick(movement.endPosition);

      if (!picked || !picked.id || !picked.id.polygon) {
        tooltip.style.display = "none";
        return;
      }

      // Only show simple hover tooltip (no popup)
      let html = picked.id.description;

      if (html && typeof html === 'object' && html.getValue) {
        html = html.getValue(viewer.clock.currentTime);
      }

      if (!html) {
        tooltip.style.display = "none";
        return;
      }

      tooltip.innerHTML = html;
      tooltip.style.left = movement.endPosition.x + 15 + "px";
      tooltip.style.top = movement.endPosition.y + 15 + "px";
      tooltip.style.display = "block";

    }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

    // Make functions global
    window.toggleAnimation = toggleAnimation;
    window.pauseAnimation = pauseAnimation;
    window.resetAnimation = resetAnimation;
    window.updateAnimationSpeed = updateAnimationSpeed;



  </script>

</body>
